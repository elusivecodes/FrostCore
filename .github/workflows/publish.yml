name: Publish

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run js-lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance
